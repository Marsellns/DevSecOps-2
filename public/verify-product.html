<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Product — SPV System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
</head>
<body>
    <!-- Public Navigation -->
    <nav class="public-nav" id="publicNav"></nav>

    <div class="public-page-wrapper">
        <div class="content-header">
            <h1>Verify Product</h1>
            <p>Scan a QR code or enter product details to verify authenticity</p>
        </div>
        <div class="content-body">
            <div id="alertContainer"></div>

            <div class="tabs">
                <button class="tab active" onclick="switchTab('scan')">📷 Scan QR Code</button>
                <button class="tab" onclick="switchTab('manual')">⌨️ Manual Input</button>
            </div>

            <div class="grid-2">
                <div class="card">
                    <div class="card-body">
                        <!-- QR Scanner -->
                        <div id="scanTab">
                            <div id="qrReader" style="width:100%;border-radius:var(--radius-sm);overflow:hidden"></div>
                            <p class="text-center mt-2" style="font-size:0.8rem;color:var(--text-muted)">
                                Point your camera at a product QR code
                            </p>
                        </div>

                        <!-- Manual Input -->
                        <div id="manualTab" class="hidden">
                            <form id="verifyForm">
                                <div class="form-group">
                                    <label for="productId">Product ID</label>
                                    <input type="text" id="productId" class="form-control" placeholder="e.g. PRD-A1B2C3D4" required>
                                </div>
                                <div class="form-group">
                                    <label for="signature">HMAC Signature</label>
                                    <input type="text" id="signature" class="form-control" placeholder="Enter the HMAC-SHA256 signature" required>
                                </div>
                                <button type="submit" id="verifyBtn" class="btn btn-primary btn-lg btn-block">
                                    🔍 Verify Product
                                </button>
                            </form>
                        </div>
                    </div>
                </div>

                <div>
                    <div id="verificationResult"></div>
                </div>
            </div>
        </div>
    </div>
    <script src="/js/api.js"></script>
    <script src="/js/verify-product.js"></script>
</body>
</html>
