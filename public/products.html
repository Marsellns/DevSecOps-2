<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Catalog — SPV System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .catalog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
        }

        .product-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            overflow: hidden;
            transition: var(--transition);
            cursor: pointer;
            animation: slideUp 0.5s ease-out both;
        }

        .product-card:nth-child(1) { animation-delay: 0.05s; }
        .product-card:nth-child(2) { animation-delay: 0.1s; }
        .product-card:nth-child(3) { animation-delay: 0.15s; }
        .product-card:nth-child(4) { animation-delay: 0.2s; }
        .product-card:nth-child(5) { animation-delay: 0.25s; }
        .product-card:nth-child(6) { animation-delay: 0.3s; }

        .product-card:hover {
            border-color: var(--border-glow);
            box-shadow: var(--shadow-glow);
            transform: translateY(-4px);
        }

        .product-card-img {
            width: 100%;
            height: 220px;
            overflow: hidden;
            background: linear-gradient(135deg, #1a1f35, #0f1225);
            position: relative;
        }

        .product-card-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease;
        }

        .product-card:hover .product-card-img img {
            transform: scale(1.05);
        }

        .product-card-img .status-overlay {
            position: absolute;
            top: 12px;
            right: 12px;
        }

        .product-card-img .suspicious-flag {
            position: absolute;
            top: 12px;
            left: 12px;
        }

        .product-card-body {
            padding: 20px;
        }

        .product-card-body h3 {
            font-size: 1.05rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--text-primary);
        }

        .product-card-meta {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 14px;
        }

        .product-card-meta span {
            font-size: 0.8rem;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .product-card-meta span em {
            font-style: normal;
            color: var(--text-muted);
            min-width: 80px;
        }

        .product-card-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 20px;
            border-top: 1px solid var(--border-color);
            background: var(--bg-glass);
        }

        .product-card-footer .manufacturer {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .product-card-footer .manufacturer strong {
            color: var(--text-secondary);
        }

        .search-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 28px;
        }

        .search-bar input {
            flex: 1;
        }

        .catalog-stats {
            display: flex;
            gap: 24px;
            margin-bottom: 28px;
            flex-wrap: wrap;
        }

        .catalog-stat {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .catalog-stat .num {
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--text-primary);
        }

        .filter-chips {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .chip {
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid var(--border-color);
            background: var(--bg-glass);
            color: var(--text-secondary);
            transition: var(--transition);
        }

        .chip:hover, .chip.active {
            background: rgba(99, 102, 241, 0.1);
            border-color: var(--accent-primary);
            color: var(--accent-primary);
        }

        /* Modal for product detail */
        .detail-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .detail-img {
            border-radius: var(--radius-sm);
            overflow: hidden;
            background: linear-gradient(135deg, #1a1f35, #0f1225);
        }

        .detail-img img {
            width: 100%;
            height: 300px;
            object-fit: cover;
        }

        .detail-info {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        @media (max-width: 768px) {
            .detail-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Public Navigation -->
    <nav class="public-nav" id="publicNav"></nav>

    <div class="public-page-wrapper">
        <div class="content-header">
            <h1>🛍️ Product Catalog</h1>
            <p>Browse all registered products in the supply chain</p>
        </div>
        <div class="content-body">
                <div id="alertContainer"></div>

                <!-- Search & Filter -->
                <div class="search-bar">
                    <input type="text" class="form-control" id="searchInput" placeholder="🔍 Search products by name, ID, or batch number...">
                </div>

                <div class="filter-chips" id="filterChips">
                    <span class="chip active" onclick="filterProducts('all')">All</span>
                    <span class="chip" onclick="filterProducts('manufactured')">🏭 Manufactured</span>
                    <span class="chip" onclick="filterProducts('distributed')">🚚 Distributed</span>
                    <span class="chip" onclick="filterProducts('retail')">🏪 Retail</span>
                    <span class="chip" onclick="filterProducts('sold')">✅ Sold</span>
                </div>

                <!-- Stats -->
                <div class="catalog-stats" id="catalogStats"></div>

                <!-- Product Grid -->
                <div class="catalog-grid" id="catalogGrid">
                    <div class="empty-state" style="grid-column:1/-1">
                        <span class="spinner"></span>
                        <p class="mt-2" style="color:var(--text-muted)">Loading products...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Product Detail Modal -->
    <div class="modal-overlay hidden" id="productModal">
        <div class="modal" style="max-width:700px">
            <div class="modal-header">
                <h3 id="modalTitle">Product Details</h3>
                <button class="modal-close" onclick="closeModal()">✕</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/products.js"></script>
</body>
</html>
