<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — SPV System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <button class="menu-toggle" onclick="toggleSidebar()" aria-label="Toggle Sidebar">☰</button>
    <div class="app-layout">
        <aside class="sidebar" id="sidebar"></aside>
        <main class="main-content">
            <div class="content-header">
                <h1>Dashboard</h1>
                <p>Overview of your product verification system</p>
            </div>
            <div class="content-body">
                <div id="alertContainer"></div>
                <div class="stats-grid" id="statsGrid">
                    <div class="stat-card info">
                        <div class="stat-icon">📦</div>
                        <div class="stat-value" id="totalProducts">—</div>
                        <div class="stat-label">Total Products</div>
                    </div>
                    <div class="stat-card success">
                        <div class="stat-icon">✅</div>
                        <div class="stat-value" id="verifiedProducts">—</div>
                        <div class="stat-label">Verified Products</div>
                    </div>
                    <div class="stat-card danger">
                        <div class="stat-icon">⚠️</div>
                        <div class="stat-value" id="suspiciousProducts">—</div>
                        <div class="stat-label">Suspicious Products</div>
                    </div>
                </div>
                <div class="card">
                    <div class="card-header">
                        <h3>📋 Recent Activity</h3>
                    </div>
                    <div class="card-body">
                        <div class="table-wrapper">
                            <table>
                                <thead>
                                    <tr>
                                        <th>Action</th>
                                        <th>User</th>
                                        <th>Details</th>
                                        <th>Time</th>
                                    </tr>
                                </thead>
                                <tbody id="activityTable">
                                    <tr><td colspan="4" class="text-center" style="padding:40px;color:var(--text-muted)">Loading...</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="/js/api.js"></script>
    <script src="/js/dashboard.js"></script>
</body>
</html>
